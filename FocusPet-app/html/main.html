<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPet - Main</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-main">
    <div class="screen">
        <!-- Header Stats -->
        <div class="header-top">
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-icon">🔥</span>
                    <span class="stat-value" id="streakCount">10 Hari</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💰</span>
                    <span class="stat-value" id="coinCount">200</span>
                </div>
            </div>
            <button class="main-inventory-button" type="button" onclick="openInventoryModal()"
                aria-label="Buka inventaris">
                <img class="main-inventory-icon" src="../assets/inventory-folder.svg" alt="" aria-hidden="true">
            </button>
            <button class="logout-button" type="button" onclick="logout()" aria-label="Keluar">
                Logout
            </button>
        </div>

        <!-- Pet Card -->
        <div class="pet-card">
            <div class="pet-section">
                <div class="pet-header">
                    <div class="pet-name-row">
                        <div>
                            <div class="pet-name" id="petName">Puppy</div>
                            <div class="pet-mood" id="petMood">Mood: Bahagia</div>
                        </div>
                        <button class="pet-edit-button" id="editPetNameButton" type="button"
                            aria-label="Ubah nama pet">✎</button>
                    </div>
                    <div class="pet-level" id="petLevel">Level 1</div>
                </div>
                <div class="pet-image-container">
                    <!-- ID pet-display ditambahkan di sini untuk integrasi JS -->
                    <img id="pet-display" class="pet-placeholder" src="../assets/petsehat.jpeg" alt="Pet Doggy">
                    <span class="pet-accessory-overlay" id="petAccessoryOverlay"></span>
                </div>
            </div>
            <div class="level-section">
                <div class="level-bar">
                    <div class="level-progress" id="levelProgress" style="width: 0%;"></div>
                </div>
                <div class="level-info">
                    <span id="currentXP">0</span> / <span id="maxXP">100</span> XP
                </div>
            </div>
        </div>

        <!-- Menu Items -->
        <div class="menu-section">
            <a href="belajar.html" class="menu-item" data-page="belajar">
                <span class="menu-icon">📚</span>
                <span class="menu-text">Mulai Beraktivitas</span>
            </a>
            <a href="toko.html" class="menu-item" data-page="toko">
                <span class="menu-icon">🏪</span>
                <span class="menu-text">Toko Virtual</span>
            </a>
            <a href="leaderboard.html" class="menu-item" data-page="leaderboard">
                <span class="menu-icon">🏆</span>
                <span class="menu-text">Leaderboard</span>
            </a>
            <a href="statistik.html" class="menu-item" data-page="statistik">
                <span class="menu-icon">📊</span>
                <span class="menu-text">Statistik</span>
            </a>
            <!-- Ini bagian yang ditambal: Tombol Skor Terbaik menjadi navigasi halaman -->
            <a href="skor.html" class="menu-item" data-page="skor">
                <span class="menu-icon">🥇</span>
                <span class="menu-text">Skor Terbaik</span>
            </a>
        </div>
    </div>


    <div id="inventoryModal" class="inventory-modal hidden">
        <div class="modal-overlay" onclick="closeInventoryModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close" type="button" onclick="closeInventoryModal()" aria-label="Kembali">
                    <img class="modal-close-icon" src="../assets/back-arrow.svg" alt="" aria-hidden="true">
                </button>
                <h2>Inventaris Saya</h2>
            </div>
            <div id="inventoryModalList" class="inventory-list"></div>
        </div>
    </div>

    <!-- Bagian <div class="score-modal-overlay"...> yang berisi 50 baris kode telah saya hapus dari sini karena sudah dipindahkan ke skor.html -->

    <div class="pet-name-modal-overlay" id="petNameModalOverlay">
        <div class="pet-name-modal">
            <button class="pet-name-modal-close" id="petNameModalClose" type="button">×</button>
            <h3>Ubah Nama Pet</h3>
            <p>Masukkan nama baru untuk Dogy (maksimal 20 karakter).</p>
            <input id="petNameInput" type="text" maxlength="20" placeholder="Nama pet baru" />
            <div class="pet-name-modal-actions">
                <button class="pet-name-cancel" id="petNameCancelButton" type="button">Batal</button>
                <button class="pet-name-save" id="petNameSaveButton" type="button">Simpan</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>

</html>
