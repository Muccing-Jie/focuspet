<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPet - Lupa Password</title>
    <meta name="description" content="Reset password akun FocusPet kamu melalui email.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Global reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: #1a1a1a;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        }

        /* Logo */
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-image {
            width: 140px;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #FFB366;
            text-decoration: none;
            margin-bottom: 24px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #FF9D3E;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* Title */
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #a0a0a0;
            text-align: center;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* Icon section */
        .icon-section {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .icon-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFF3E6 0%, #FFE8CC 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(255, 179, 102, 0.2);
        }

        .icon-circle svg {
            width: 32px;
            height: 32px;
            color: #FFB366;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        .form-input:focus {
            outline: none;
            border-color: #FFB366;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 179, 102, 0.1);
        }

        .form-input::placeholder {
            color: #d0d0d0;
        }

        /* Submit button */
        .reset-button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #FFB366 0%, #FF9D3E 100%);
            border: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 157, 62, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(255, 157, 62, 0.4);
        }

        .reset-button:active {
            transform: translateY(0);
        }

        .reset-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Success message */
        .success-card {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-card.visible {
            display: block;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.15);
        }

        .success-icon svg {
            width: 28px;
            height: 28px;
            color: #4caf50;
        }

        .success-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .success-text {
            font-size: 13px;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .success-email {
            font-weight: 600;
            color: #FFB366;
        }

        .back-to-login {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #FFB366 0%, #FF9D3E 100%);
            border: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 157, 62, 0.3);
        }

        .back-to-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(255, 157, 62, 0.4);
        }

        /* Login section */
        .login-section {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #a0a0a0;
        }

        .login-link {
            color: #FFB366;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link:hover {
            color: #FF9D3E;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .logo-image {
                width: 120px;
            }

            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../assets/logo.jpeg" alt="Logo FocusPet" class="logo-image">
        </div>

        <!-- Back link -->
        <a href="login.html" class="back-link" id="backLink">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Kembali ke Login
        </a>

        <!-- Icon -->
        <div class="icon-section">
            <div class="icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
        </div>

        <!-- Title -->
        <h1 class="title">Lupa Password?</h1>
        <p class="subtitle">Masukkan email yang terdaftar dan kami akan mengirimkan link untuk mereset password kamu.</p>

        <!-- Form Section -->
        <div id="formSection">
            <form id="forgotForm" onsubmit="return handleForgotPassword(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Masukkan alamat email"
                        required
                    >
                </div>

                <button type="submit" id="resetButton" class="reset-button">Kirim Link Reset</button>
            </form>

            <div class="login-section">
                Ingat password? <a href="login.html" class="login-link">Masuk</a>
            </div>
        </div>

        <!-- Success Section (hidden by default) -->
        <div class="success-card" id="successSection">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2 class="success-title">Email Terkirim!</h2>
            <p class="success-text">
                Link reset password telah dikirim ke<br>
                <span class="success-email" id="sentEmail"></span>
            </p>
            <a href="login.html" class="back-to-login">Kembali ke Login</a>
        </div>
    </div>

    <script>
        function handleForgotPassword(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const resetButton = document.getElementById('resetButton');

            // Loading state
            resetButton.textContent = 'Mengirim...';
            resetButton.disabled = true;

            // Kirim ke API backend
            fetch('http://localhost/focuspet-api/forgot-password.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Tampilkan success card
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('backLink').style.display = 'none';
                    document.getElementById('sentEmail').textContent = email;
                    document.getElementById('successSection').classList.add('visible');
                } else {
                    alert(data.message || 'Email tidak ditemukan. Silakan coba lagi.');
                    resetButton.textContent = 'Kirim Link Reset';
                    resetButton.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                // Tampilkan success card meskipun error (untuk keamanan, jangan bocorkan apakah email terdaftar atau tidak)
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('backLink').style.display = 'none';
                document.getElementById('sentEmail').textContent = email;
                document.getElementById('successSection').classList.add('visible');
            });

            return false;
        }
    </script>
</body>
</html>
