<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivitas Minggu Ini</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-statistik-detail">
    <div class="screen">
        <button class="back-button" type="button" onclick="location.href='statistik.html'">← Kembali</button>

                        <div class="bar c2022" data-value="50"></div>
                        <div class="bar-label">sen</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar c2020" data-value="55"></div>
                        <div class="bar c2021" data-value="70"></div>
                        <div class="bar c2022" data-value="45"></div>
                        <div class="bar-label">sel</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar c2020" data-value="60"></div>
                        <div class="bar c2021" data-value="50"></div>
                        <div class="bar c2022" data-value="65"></div>
                        <div class="bar-label">rab</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar c2020" data-value="45"></div>
                        <div class="bar c2021" data-value="80"></div>
                        <div class="bar c2022" data-value="70"></div>

                        <div class="bar-label">jum</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar c2020" data-value="30"></div>
                        <div class="bar c2021" data-value="40"></div>
                        <div class="bar c2022" data-value="35"></div>
                        <div class="bar-label">sab</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar c2020" data-value="20"></div>
                        <div class="bar c2021" data-value="25"></div>
                        <div class="bar c2022" data-value="30"></div>
                        <div class="bar-label">min</div>
                    </div>
                </div>

                <div class="chart-legend">
                    <div class="legend-item"><span class="legend-color c2020"></span>2020</div>
                    <div class="legend-item"><span class="legend-color c2021"></span>2021</div>
                    <div class="legend-item"><span class="legend-color c2022"></span>2022</div>
                </div>
            </div>
        </section>

        
        <script src="../js/statistik.js"></script>
    </div>
</body>
</html>
