<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPet - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-login">
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../assets/logo.jpeg" alt="Logo FocusPet" class="logo-image">
        </div>

        <!-- Title -->
        <h1 class="title">Masuk</h1>
        <p class="subtitle">Selamat datang kembali ke FocusPet</p>

        <!-- Login Form -->
        <form onsubmit="return handleLogin(event)">
            <!-- Email Field -->
            <div class="form-group">
                <label class="form-label" for="email">Email Gmail</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="Masukkan email Gmail"
                    pattern="[a-z0-9._%+-]+@gmail\.com"
                    title="Gunakan alamat email Gmail"
                    required
                >
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-field">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Masukkan password"
                        required
                    >
                </div>
            </div>

            <!-- Remember & Forgot -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" class="checkbox">
                    <label for="remember">Ingat saya</label>
                </div>
                <a href="#" class="forgot-password">Lupa password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-button">Masuk</button>
        </form>

        <!-- Sign Up Section -->
        <div class="signup-section">
            Belum punya akun? <a href="#" class="signup-link">Daftar sekarang</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email.toLowerCase().endsWith('@gmail.com')) {
        alert('Hanya alamat email Gmail yang diizinkan untuk login.');
        return false;
    }
    
    // Panggil API PHP Server (sesuaikan port jika bukan 3000)
    fetch('http://localhost/focuspet-api/login.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: email, password: password })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            // Simpan user_id ke browser agar bisa dipakai di halaman main, toko, dll.
            localStorage.setItem('user_id', data.user_id);
            alert('Login berhasil! Selamat datang kembali.');
            window.location.href = 'start.html';
        } else {
            alert(data.message); // Menampilkan pesan error dari PHP (misal: password salah)
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Gagal terhubung ke server backend. Pastikan PHP Server sudah jalan!');
    });

    return false;
}
    </script>
</body>
</html>
