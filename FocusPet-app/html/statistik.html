<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPet - Statistik</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-statistik">
    <div class="screen">
        <!-- Header Stats -->
        <div class="header-stats">
            <div class="stat-item">
                <span class="stat-icon">🔥</span>
                <span class="stat-value" id="streakCount">0 Hari</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">💰</span>
                <span class="stat-value" id="coinCount">0</span>
            </div>
        </div>

        <button class="back-button" type="button" onclick="location.href='main.html'">← Kembali</button>
        <!-- top summary removed -->

        <section class="accordion-group">
            <a href="statistik-aktivitas.html" class="section-card section-link">
                <div class="section-header">
                    <div style="display:flex;align-items:center;gap:10px"><span class="section-icon">📊</span><span>AKTIVITAS MINGGU INI</span></div>
                    <span class="section-expand">›</span>
                </div>
            </a>

            <a href="statistik-rapor.html" class="section-card section-link">
                <div class="section-header">
                    <div style="display:flex;align-items:center;gap:10px"><span class="section-icon">📒</span><span>RAPOR HEWAN PELIHARAAN</span></div>
                    <span class="section-expand">›</span>
                </div>
            </a>

            <a href="riwayat.html" class="section-card section-link" id="historySectionCard">
                <div class="section-header">
                    <div style="display:flex;align-items:center;gap:10px"><span class="section-icon">📜</span><span>RIWAYAT SESI</span></div>
                    <span class="section-expand">›</span>
                </div>
            </a>
        </section>

        <section class="favorite-card">
            <div class="favorite-header">TOPIK TERFAVORIT</div>
            <div class="favorite-body" id="favoriteTopicsList">
                <!-- favorite topics will be rendered here by js/statistik.js -->
            </div>
        </section>

        <script src="../js/focuspet-sync.js"></script>
        <script src="../js/statistik.js"></script>
    </div>
</body>
</html>
